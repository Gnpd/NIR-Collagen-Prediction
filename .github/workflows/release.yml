name: Release

# Triggers on version tags (e.g. v1.0.0) pushed to the repository.
# Creates a GitHub Release and uploads one executable per platform.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # required to create GitHub Releases

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false  # let other platforms finish even if one fails
      matrix:
        include:
          - os: windows-latest
            artifact: nir-collagen-api-windows.exe

          - os: macos-latest
            artifact: nir-collagen-api-macos

          - os: ubuntu-22.04
            artifact: nir-collagen-api-linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r api/requirements.txt pyinstaller

      - name: Build executable
        working-directory: api
        run: python build.py

      - name: Rename artifact
        shell: bash
        run: |
          ext=${{ runner.os == 'Windows' && '.exe' || '' }}
          mv "api/dist/nir-collagen-api${ext}" "api/dist/${{ matrix.artifact }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: api/dist/${{ matrix.artifact }}
